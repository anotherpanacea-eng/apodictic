name: release

# On a v* tag, build the per-host bundles from canonical plugins/ and publish
# them as release assets so Codex / Antigravity / Claude users install by
# download-and-open — no clone, no Node. The generated host trees are no longer
# committed to the repo (decision: GitHub #52, Option B).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build host bundles
        run: |
          node scripts/build-codex.mjs
          node scripts/build-antigravity.mjs

      - name: Package Claude plugin
        run: |
          (cd plugins/apodictic && zip -rq "$GITHUB_WORKSPACE/apodictic.plugin" . -x ".git/*")

      - name: Resolve release notes from changelog
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if node scripts/assemble-changelog.mjs --section "$VERSION" > release-notes.md 2>/dev/null && [ -s release-notes.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release + upload bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
              gh release edit "$TAG" --notes-file release-notes.md
            fi
          elif [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" \
            dist/apodictic-codex-marketplace.zip \
            dist/apodictic-antigravity.zip \
            apodictic.plugin \
            --clobber
