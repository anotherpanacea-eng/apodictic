name: ci

# APODICTIC is a prompt/skill plugin: there is no pytest suite, but it does
# carry a validator self-test harness (scripts/validate.sh). CI is a correctness
# gate — byte-compile the canonical Python, confirm every plugin/marketplace
# manifest is valid JSON, and run the validator self-tests plus the real-file
# canonical-framework invariants. Validator self-tests, canonical-file checks,
# and lightweight static/build checks run in parallel behind one required
# `validate` result. The eval fixtures under evals/ are the behavioral
# ground-truth track, run separately.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    name: static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Byte-compile canonical Python (syntax gate)
        run: python -m compileall -q plugins scripts tools tests

      - name: Validate plugin + marketplace manifests parse as JSON
        run: |
          set -e
          mapfile -t files < <(git ls-files '*.json' | grep -E '(plugin|marketplace|release-registry)\.json$')
          if [ ${#files[@]} -eq 0 ]; then echo "no manifests found"; exit 1; fi
          for f in "${files[@]}"; do
            echo "checking $f"
            python -m json.tool "$f" > /dev/null
          done
          echo "all ${#files[@]} manifests parse"

      # Cross-manifest version parity: the canonical version (3 plugin.json +
      # 2 marketplace.json + 5 SKILL.md frontmatters) must all agree, so a
      # partial / forgotten bump can't merge. --versions-only runs ONLY the parity
      # check (the build / --check-all gates already run as their own steps below).
      - name: Version parity across manifests
        run: node scripts/release-verify.mjs --versions-only

      # Research reliability layer (docs/research-reliability-layer.md). These
      # research-dir modules are single-sourced (NOT in root scripts/, NOT in the
      # validate.sh mirror pair), so their --self-test cannot route through an
      # AGG_VALIDATORS dispatcher arm (a byte-identical arm can't reach the
      # research dir — see the doc's P1 resolution). CI runs the self-tests
      # directly instead. Static paths only; no workflow inputs are interpolated.
      - name: Research reliability self-tests
        run: |
          python3 plugins/apodictic/skills/specialized-audits/scripts/api_reliability.py --self-test
          python3 plugins/apodictic/skills/specialized-audits/scripts/response_cache.py --self-test
          python3 plugins/apodictic/skills/specialized-audits/scripts/academic_apis.py --self-test

      # Generator + parity gates. The host trees are no longer committed
      # (GitHub #52), so parity is verified by regenerating fresh and
      # self-checking rather than diffing against committed copies.
      - name: Changelog fragments parse
        run: node scripts/assemble-changelog.mjs --check

      - name: Status-drift lint (spec Status vs shipped deliverables)
        run: |
          node scripts/check-status-drift.mjs --self-test
          node scripts/check-status-drift.mjs

      # Guards that the display surfaces (overview-dashboard.html,
      # AUDIT_SELECTION_MATRIX.md) stay synced with the canonical audit/research
      # inventory: a sync-marker + changed-since signal (the #79 status-drift
      # pattern applied to inventory). Self-test proves it's non-vacuous.
      - name: Inventory-parity sync-marker check
        run: |
          node scripts/check-inventory-parity.mjs --self-test
          node scripts/check-inventory-parity.mjs

      - name: Registry-derived docs are up to date
        run: node scripts/release-generate.mjs --check

      - name: Codex + Antigravity builds self-check
        run: |
          node scripts/build-codex.mjs --self-check
          node scripts/build-antigravity.mjs --self-check

      # SETEC contract gate (Increment 2 / R1 adoption). CHECK 1 (offline
      # self-consistency: every ai_prose_*.py shim surface appears in the
      # vendored manifest with a floor) runs here with no SETEC installed —
      # the analog of Gemini's validateRegistry. CHECK 2 (live drift vs
      # `capabilities emit`) is SKIPPED in CI (no SETEC checkout); the weekly
      # sync-setec workflow enforces it against a real SETEC release.
      - name: SETEC contract drift gate (self-consistency)
        run: python tools/check_setec_contract.py

      - name: SETEC contract tests (floors + vendored-golden parse)
        run: python tests/setec-contract/test_setec_contract.py

      # Skill-registration discoverability guard (apodictic#126): every new
      # reference module must be registered on its owning skill's trigger
      # surface + reference-module registry list, exactly as its siblings are.
      - name: Skill-registration discoverability guard
        run: python tests/skill-registration/test_content_advisory_registration.py

  validator_self_tests:
    name: validator self-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validator self-tests
        run: bash scripts/validate.sh --self-test-all

  canonical_framework:
    name: canonical-framework gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Real-file invariants against the actual canonical framework files
      # (pass-dependencies.md, shipped templates, worked examples, and run
      # folders), separated from the hermetic self-tests so CI can run both.
      - name: Canonical-framework gate
        run: bash scripts/validate.sh --check-canonical

  validate:
    name: validate
    if: ${{ always() }}
    needs: [static_checks, validator_self_tests, canonical_framework]
    runs-on: ubuntu-latest
    steps:
      - name: Require every parallel gate
        env:
          STATIC_RESULT: ${{ needs.static_checks.result }}
          SELF_TEST_RESULT: ${{ needs.validator_self_tests.result }}
          CANONICAL_RESULT: ${{ needs.canonical_framework.result }}
        run: |
          test "$STATIC_RESULT" = success
          test "$SELF_TEST_RESULT" = success
          test "$CANONICAL_RESULT" = success
