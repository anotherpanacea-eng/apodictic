name: ci

# APODICTIC is a prompt/skill plugin: there is no pytest suite, but it does
# carry a validator self-test harness (scripts/validate.sh). CI is a correctness
# gate — byte-compile the canonical Python, confirm every plugin/marketplace
# manifest is valid JSON, and run the validator self-tests plus the real-file
# canonical-framework invariants (validate.sh --check-all). The eval fixtures
# under evals/ are the behavioral ground-truth track, run separately.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Byte-compile canonical Python (syntax gate)
        run: python -m compileall -q plugins scripts

      - name: Validate plugin + marketplace manifests parse as JSON
        run: |
          set -e
          mapfile -t files < <(git ls-files '*.json' | grep -E '(plugin|marketplace|release-registry)\.json$')
          if [ ${#files[@]} -eq 0 ]; then echo "no manifests found"; exit 1; fi
          for f in "${files[@]}"; do
            echo "checking $f"
            python -m json.tool "$f" > /dev/null
          done
          echo "all ${#files[@]} manifests parse"

      # --check-all subsumes --self-test-all (the 40 validator self-tests) and
      # adds the real-file invariants: the validators are run against the actual
      # canonical framework files (pass-dependencies.md, the shipped templates,
      # the canonical worked examples + run folder), not just their own fixtures.
      - name: Validator self-tests + canonical-framework gate
        run: bash scripts/validate.sh --check-all

      # Generator + parity gates. The host trees are no longer committed
      # (GitHub #52), so parity is verified by regenerating fresh and
      # self-checking rather than diffing against committed copies.
      - name: Changelog fragments parse
        run: node scripts/assemble-changelog.mjs --check

      - name: Registry-derived docs are up to date
        run: node scripts/release-generate.mjs --check

      - name: Codex + Antigravity builds self-check
        run: |
          node scripts/build-codex.mjs --self-check
          node scripts/build-antigravity.mjs --self-check
